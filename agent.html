<!DOCTYPE html>
<html>
<head>
    <title>Reflexive Vault</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f2027 0%, #203a43 50%, #2c5364 100%);
            min-height: 100vh;
            padding: 20px;
            margin: 0;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
        }
        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }
        .header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }
        .header p {
            font-size: 1.1rem;
            opacity: 0.9;
        }
        .main-card {
            background: rgba(255,255,255,0.95);
            border-radius: 24px;
            padding: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.15);
        }
        .status-section {
            background: #f8fafc;
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 25px;
            border-left: 4px solid #2c5364;
        }
        .status-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid #e2e8f0;
        }
        .status-item:last-child {
            border-bottom: none;
        }
        .status-label {
            font-weight: 600;
            color: #1e293b;
        }
        .status-value {
            font-family: monospace;
            font-weight: 500;
            color: #2c5364;
        }
        .trust-value {
            color: #10b981;
            font-size: 1.3rem;
            font-weight: bold;
        }
        .input-area {
            display: flex;
            gap: 12px;
            margin-bottom: 25px;
        }
        .question-input {
            flex: 1;
            padding: 14px 18px;
            border: 2px solid #e2e8f0;
            border-radius: 14px;
            font-size: 1rem;
            outline: none;
        }
        .question-input:focus {
            border-color: #2c5364;
        }
        .ask-btn {
            padding: 14px 28px;
            background: linear-gradient(135deg, #2c5364 0%, #203a43 100%);
            color: white;
            border: none;
            border-radius: 14px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 600;
            transition: transform 0.2s;
        }
        .ask-btn:hover {
            transform: translateY(-2px);
        }
        .answer-section {
            background: #f8fafc;
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 25px;
        }
        .answer-question {
            background: #2c5364;
            color: white;
            padding: 8px 16px;
            border-radius: 20px;
            display: inline-block;
            margin-bottom: 15px;
            font-size: 0.85rem;
        }
        .answer-content {
            color: #1e293b;
            line-height: 1.6;
        }
        .audit-section {
            background: #0f2027;
            border-radius: 16px;
            padding: 20px;
        }
        .audit-title {
            color: #94a3b8;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 15px;
        }
        .audit-log {
            font-family: monospace;
            font-size: 0.75rem;
            color: #cbd5e1;
            max-height: 200px;
            overflow-y: auto;
        }
        .audit-entry {
            padding: 8px 0;
            border-bottom: 1px solid #1e293b;
        }
        .footer {
            text-align: center;
            margin-top: 20px;
            color: rgba(255,255,255,0.6);
            font-size: 0.8rem;
        }
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid #e2e8f0;
            border-top-color: #2c5364;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🛡️ Reflexive Vault</h1>
            <p>Self-Defending AI Agent with Cryptographic Identity</p>
        </div>

        <div class="main-card">
            <div class="status-section">
                <div class="status-item">
                    <span class="status-label">🔐 Cryptographic Identity</span>
                    <span class="status-value" id="agentId">Loading...</span>
                </div>
                <div class="status-item">
                    <span class="status-label">🛡️ Trust Score (Immune System)</span>
                    <span class="trust-value" id="trustScore">--</span>
                    <span>/100</span>
                </div>
            </div>

            <div class="input-area">
                <input type="text" id="question" class="question-input" placeholder="Ask anything... (e.g., what is biology?)">
                <button class="ask-btn" onclick="ask()">Ask</button>
            </div>

            <div id="answer" class="answer-section" style="display: none;"></div>

            <div class="audit-section">
                <div class="audit-title">📝 Audit Log (Tamper-Evident)</div>
                <div id="auditLog" class="audit-log">Loading audit log...</div>
            </div>
        </div>

        <div class="footer">
            <p>Ed25519 Identity | Dynamic Trust Scoring | Complete Audit Logging</p>
        </div>
    </div>

    <script>
        const API_URL = 'http://localhost:8001';
        
        async function loadStatus() {
            try {
                const response = await fetch(`${API_URL}/api/status`);
                const data = await response.json();
                document.getElementById('agentId').innerHTML = data.agent_id;
                document.getElementById('trustScore').innerHTML = data.trust_score;
            } catch(e) {
                document.getElementById('agentId').innerHTML = 'Server not running';
                document.getElementById('trustScore').innerHTML = '--';
            }
        }
        
        async function loadAudit() {
            try {
                const response = await fetch(`${API_URL}/api/audit`);
                const data = await response.json();
                const auditDiv = document.getElementById('auditLog');
                if (data.logs && data.logs.length > 0) {
                    auditDiv.innerHTML = data.logs.map(log => 
                        `<div class="audit-entry">📅 ${log.timestamp} | 📝 ${log.action} | ${log.outcome === 'success' ? '✅' : '❌'} ${log.outcome}</div>`
                    ).join('');
                } else {
                    auditDiv.innerHTML = '<div class="audit-entry">No actions logged yet. Ask a question.</div>';
                }
            } catch(e) {
                document.getElementById('auditLog').innerHTML = '<div class="audit-entry">Cannot connect to server</div>';
            }
        }
        
        async function ask() {
            const question = document.getElementById('question').value;
            if (!question) return;
            
            const answerDiv = document.getElementById('answer');
            answerDiv.style.display = 'block';
            answerDiv.innerHTML = '<div class="answer-question">🤔 Thinking...</div><div class="answer-content"><div class="loading"></div> Generating response...</div>';
            
            try {
                const response = await fetch(`${API_URL}/api/ask`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ question: question })
                });
                
                const data = await response.json();
                
                if (data.error) {
                    answerDiv.innerHTML = `<div class="answer-question">❌ Error</div><div class="answer-content">${data.error}</div>`;
                } else {
                    answerDiv.innerHTML = `<div class="answer-question">📝 You asked:</div><div class="answer-content">${question}</div><div class="answer-question" style="margin-top: 15px;">🤖 Reflexive Vault:</div><div class="answer-content">${data.answer}</div>`;
                }
                
                document.getElementById('question').value = '';
                loadStatus();
                loadAudit();
                
            } catch(e) {
                answerDiv.innerHTML = `<div class="answer-question">❌ Connection Error</div><div class="answer-content">Make sure the server is running on port 8001.</div>`;
            }
        }
        
        loadStatus();
        loadAudit();
        setInterval(loadAudit, 5000);
    </script>
</body>
</html>
